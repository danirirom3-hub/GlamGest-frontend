<div class="contenedor-clientes">

  <!-- BUSCADOR Y NUEVO CLIENTE -->
  <div class="header-clientes">
    <input type="text" [(ngModel)]="busqueda" placeholder="Buscar cliente...">
    <button class="btn-nuevo" (click)="limpiarFormulario(); editando=false;">
      Nuevo Cliente
    </button>
  </div>

  <!-- LISTADO -->
  <div class="cards" *ngIf="clientesFiltrados().length > 0; else vacio">
    <div class="card" *ngFor="let cliente of clientesFiltrados(); let i = index">
      <div class="card-header">
        <h3>{{ cliente.nombre }} {{ cliente.apellido }}</h3>
        <span class="correo">{{ cliente.correo }}</span>
      </div>
      <div class="card-body">
        <p><strong>Tel:</strong> {{ cliente.telefono }}</p>
        <p><strong>Dirección:</strong> {{ cliente.direccion }}</p>
      </div>
      <div class="acciones">
        <button class="btn-icon editar" (click)="editarCliente(i)">
          <i class="fas fa-pencil-alt"></i>
        </button>
        <button class="btn-icon eliminar" (click)="eliminarCliente(i)">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ESTADO VACÍO -->
  <ng-template #vacio>
    <div class="empty-state">
      <h3>No hay clientes registrados</h3>
      <p>Agrega tu primer cliente para empezar a gestionar.</p>
    </div>
  </ng-template>

  <!-- FORMULARIO -->
  <div class="form-card">
    <h2>{{ editando ? 'Editar cliente' : 'Nuevo cliente' }}</h2>
    <div class="form-grid">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nuevoCliente.nombre" placeholder="Ej: Daniela">
      </div>
      <div class="input-group">
        <label>Apellido</label>
        <input type="text" [(ngModel)]="nuevoCliente.apellido" placeholder="Ej: Rincón">
      </div>
      <div class="input-group">
        <label>Correo</label>
        <input type="email" [(ngModel)]="nuevoCliente.correo" placeholder="Ej: correo@mail.com">
      </div>
      <div class="input-group">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="nuevoCliente.telefono" placeholder="Ej: 3001234567">
      </div>
      <div class="input-group full">
        <label>Dirección</label>
        <input type="text" [(ngModel)]="nuevoCliente.direccion" placeholder="Ej: Calle 1 #23-45">
      </div>
    </div>
    <button class="btn-save" (click)="guardarCliente()">
      {{ editando ? 'Actualizar cliente' : 'Guardar cliente' }}
    </button>
  </div>

</div>
