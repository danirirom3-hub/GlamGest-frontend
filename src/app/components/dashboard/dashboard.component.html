<div class="dashboard">
  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="brand">
      <h2>Glam<span>Gest</span></h2>
    </div>

    <!-- Navigation -->
    <nav class="menu">

      <a routerLink="/dashboard/services" routerLinkActive="activo">
        <lucide-icon [img]="icons.Scissors"></lucide-icon>
        Services
      </a>

      <a routerLink="/dashboard/clients" routerLinkActive="activo">
        <lucide-icon [img]="icons.Users"></lucide-icon>
        Clients
      </a>

      <!-- ✅ Employees agregado -->
      <a routerLink="/dashboard/employees" routerLinkActive="activo">
        <lucide-icon [img]="icons.User"></lucide-icon>
        Employees
      </a>

      <a routerLink="/dashboard/sales" routerLinkActive="activo">
        <lucide-icon [img]="icons.ShoppingCart"></lucide-icon>
        Sales
      </a>

      <a routerLink="/dashboard/appointments" routerLinkActive="activo">
        <lucide-icon [img]="icons.Calendar"></lucide-icon>
        Appointments
      </a>

    </nav>

    <!-- Logout -->
    <button class="logout-btn" (click)="logout()">
      Logout
    </button>

    <!-- Footer -->
    <div class="footer">
      <p>© 2026</p>
    </div>

  </aside>

  <!-- Content -->
  <main class="contenido">
    <router-outlet></router-outlet>
  </main>
</div>
