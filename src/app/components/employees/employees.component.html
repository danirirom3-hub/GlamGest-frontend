<div class="container">
  <h2>Gestión de Empleados</h2>

  <!-- Formulario -->
  <form (ngSubmit)="saveEmployee()" #employeeForm="ngForm" class="form">

    <div class="form-group">
      <label for="name">Nombre</label>
      <input 
        type="text" 
        id="name" 
        name="name"
        [(ngModel)]="employee.name" 
        required 
        class="form-control"
        placeholder="Ingrese el nombre">
    </div>

    <div class="form-group">
      <label for="phone">Teléfono</label>
      <input 
        type="text" 
        id="phone" 
        name="phone"
        [(ngModel)]="employee.phone" 
        required 
        class="form-control"
        placeholder="Ingrese el teléfono">
    </div>

    <div class="form-group">
      <label for="active">Estado</label>
      <select 
        id="active" 
        name="active"
        [(ngModel)]="employee.active" 
        class="form-control">
        <option [ngValue]="true">Activo</option>
        <option [ngValue]="false">Inactivo</option>
      </select>
    </div>

    <!-- 🔥 Contenedor para centrar botones -->
    <div class="form-group">
      <button type="submit" class="btn btn-primary" [disabled]="employeeForm.invalid">
        Guardar
      </button>

      <button type="button" class="btn btn-secondary" (click)="resetForm()">
        Cancelar
      </button>
    </div>

  </form>

  <hr>

  <!-- Lista -->
  <h3>Lista de Empleados</h3>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.name }}</td>
        <td>{{ emp.phone }}</td>
        <td>
          <span [ngClass]="emp.active ? 'text-success' : 'text-danger'">
            {{ emp.active ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td>
          <button class="btn btn-warning btn-sm" (click)="editEmployee(emp)">
            Editar
          </button>

          <button class="btn btn-danger btn-sm" (click)="deleteEmployee(emp.id)">
            Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
