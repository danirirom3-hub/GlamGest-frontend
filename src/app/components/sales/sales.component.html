<div class="page">

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h2>Ventas</h2>
      <p>Controla los ingresos del salón</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button 
        [class.active]="view === 'create'" 
        (click)="view = 'create'">
        Nueva Venta
      </button>

      <button 
        [class.active]="view === 'history'" 
        (click)="view = 'history'">
        Historial
      </button>
    </div>

    <!-- ========================= -->
    <!-- Registro -->
    <!-- ========================= -->
    <div *ngIf="view === 'create'" class="card fade-in">

      <h3>Registrar Venta</h3>

      <div class="grid">

        <!-- Cliente -->
        <div class="form-group">
          <label>Cliente</label>
          <select>
            <option>Seleccionar cliente</option>
            <option>Ana Gómez</option>
            <option>Laura Martínez</option>
          </select>
        </div>

        <!-- Método de pago -->
        <div class="form-group">
          <label>Método de pago</label>
          <select>
            <option>Seleccionar método</option>
            <option>Efectivo</option>
            <option>Tarjeta</option>
            <option>Transferencia</option>
          </select>
        </div>

      </div>

      <!-- Servicios -->
      <div class="form-group">
        <label>Servicios</label>

        <div class="servicios-grid">

          <div 
            class="servicio-item"
            [class.activo]="selectedService === 1"
            (click)="selectService(1)"
          >
            <span>Corte</span>
            <small>$20.000</small>
          </div>

          <div 
            class="servicio-item"
            [class.activo]="selectedService === 2"
            (click)="selectService(2)"
          >
            <span>Uñas</span>
            <small>$30.000</small>
          </div>

          <div 
            class="servicio-item"
            [class.activo]="selectedService === 3"
            (click)="selectService(3)"
          >
            <span>Tinte</span>
            <small>$80.000</small>
          </div>

        </div>
      </div>

      <!-- Total -->
      <div class="total-box">
        <span>Total</span>
        <h2>$0</h2>
      </div>

      <!-- Botón -->
      <button class="btn-primary">
        Registrar Venta
      </button>

    </div>

    <!-- ========================= -->
    <!-- Historial -->
    <!-- ========================= -->
    <div *ngIf="view === 'history'" class="card fade-in">

      <h3>Historial de Ventas</h3>

      <!-- Vacío -->
      <div class="empty">
        No hay ventas registradas
      </div>

      <!-- Tabla -->
      <div class="tabla">

        <!-- Header -->
        <div class="fila header">
          <span>Fecha</span>
          <span>Cliente</span>
          <span>Total</span>
          <span>Pago</span>
          <span></span>
        </div>

        <!-- Venta 1 -->
        <div class="fila">
          <span>08/04</span>
          <span>Ana</span>
          <span>$50.000</span>
          <span>Efectivo</span>

          <button class="btn-detalle" (click)="toggleDetail(1)">
            Ver
          </button>
        </div>

        <div class="detalle" *ngIf="activeSale === 1">
          <p>• Corte - $20.000</p>
          <p>• Uñas - $30.000</p>
        </div>

        <!-- Venta 2 -->
        <div class="fila">
          <span>07/04</span>
          <span>-</span>
          <span>$80.000</span>
          <span>Tarjeta</span>

          <button class="btn-detalle" (click)="toggleDetail(2)">
            Ver
          </button>
        </div>

        <div class="detalle" *ngIf="activeSale === 2">
          <p>• Tinte - $80.000</p>
        </div>

      </div>

    </div>

  </div>
</div>
