<div class="contenedor-servicios">

  <!-- FORMULARIO -->
  <div class="form-card">
    <div class="form-header">
      <h2>Nuevo servicio</h2>
      <span class="sub">Completa la información</span>
    </div>

    <div class="form-grid">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" placeholder="Ej: Corte de cabello">
      </div>

      <div class="input-group">
        <label>Precio</label>
        <input type="number" placeholder="$">
      </div>

      <div class="input-group">
        <label>Duración</label>
        <input type="text" placeholder="Ej: 30 min">
      </div>

      <div class="input-group full">
        <label>Descripción</label>
        <textarea placeholder="Describe el servicio..."></textarea>
      </div>
    </div>

    <button class="btn-save">Guardar servicio</button>
  </div>

  <!-- BÚSQUEDA VISUAL -->
  <div class="form-card search-card">
    <div class="input-group full">
      <label>Buscar servicio</label>
      <div class="search-input">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Escribe el nombre del servicio">
      </div>
    </div>
  </div>

  <!-- LISTADO DE SERVICIOS -->
  <div class="cards">

    <div class="card">
      <div class="card-header">
        <h3>Corte de cabello</h3>
        <span class="precio">$20000</span>
      </div>
      <div class="card-body">
        <p class="duracion">30 minutos</p>
        <p class="descripcion">Corte moderno y estilizado</p>
      </div>
      <div class="acciones">
        <button class="btn-icon editar"><i class="fas fa-pencil-alt"></i></button>
        <button class="btn-icon eliminar"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Manicure</h3>
        <span class="precio">$15000</span>
      </div>
      <div class="card-body">
        <p class="duracion">45 minutos</p>
        <p class="descripcion">Cuidado y esmaltado de uñas</p>
      </div>
      <div class="acciones">
        <button class="btn-icon editar"><i class="fas fa-pencil-alt"></i></button>
        <button class="btn-icon eliminar"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

  </div>

</div>
