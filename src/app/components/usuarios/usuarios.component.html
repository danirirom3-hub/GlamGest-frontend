<div class="page">

  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <button routerLink="/home" class="btn-back">
        <lucide-icon [img]="ArrowLeft"></lucide-icon>
        <span>Volver</span>
      </button>
    </div>

    <!-- HEADER -->
    <div class="header">
      <h2>Glam<span>Gest</span></h2>
      <p>Registro de nuevos usuarios</p>
    </div>

    <!-- FORMULARIO -->
    <form class="form" (ngSubmit)="registrar()" autocomplete="off">

      <div class="campo">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" [(ngModel)]="usuario.nombre" name="nombre" placeholder="Ej: Daniela Rincón" required>
      </div>

      <div class="campo">
        <label for="email">Correo</label>
        <input id="email" type="email" [(ngModel)]="usuario.email" name="email" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="usuario.password" name="password" placeholder="Mínimo 6 caracteres" required>
      </div>

      <button class="btn" type="submit">
        Registrar usuario
      </button>

    </form>

    <p class="mensaje">{{ mensaje }}</p>

  </div>

</div>
