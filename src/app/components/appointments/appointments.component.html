<div class="page">

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h2>Citas</h2>
      <p>Gestiona la agenda del salón</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button 
        [class.active]="view === 'create'" 
        (click)="view = 'create'">
        Nueva Cita
      </button>

      <button 
        [class.active]="view === 'list'" 
        (click)="view = 'list'">
        Agenda
      </button>
    </div>

    <!-- REGISTRO -->
    <div *ngIf="view === 'create'" class="card fade-in">

      <h3>Registrar Cita</h3>

      <div class="grid">

        <div class="form-group">
          <label>Cliente</label>
          <select>
            <option>Seleccionar cliente</option>
            <option>Ana Gómez</option>
            <option>Laura Martínez</option>
          </select>
        </div>

        <div class="form-group">
          <label>Fecha</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Hora</label>
          <input type="time">
        </div>

      </div>

      <div class="form-group">
        <label>Servicios</label>

        <div class="servicios-grid">
          <div 
            class="servicio-item"
            [class.activo]="selectedService === 1"
            (click)="selectService(1)">
            Corte
          </div>

          <div 
            class="servicio-item"
            [class.activo]="selectedService === 2"
            (click)="selectService(2)">
            Uñas
          </div>

          <div 
            class="servicio-item"
            [class.activo]="selectedService === 3"
            (click)="selectService(3)">
            Tinte
          </div>
        </div>

      </div>

      <button class="btn-primary" (click)="scheduleAppointment()">
        Agendar Cita
      </button>

      <div class="alerta" *ngIf="showConfirmation">
        Cita registrada correctamente
      </div>

    </div>

    <!-- AGENDA -->
    <div *ngIf="view === 'list'" class="card fade-in">

      <h3>Agenda de Citas</h3>

      <div class="filtros">

        <div class="form-group">
          <label>Filtrar por fecha</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Filtrar por cliente</label>
          <input type="text" placeholder="Buscar cliente">
        </div>

      </div>

      <div class="agenda-list">

        <div class="cita-card">

          <div class="cita-info">
            <h4>Ana Gómez</h4>
            <p>Corte • 10:00 AM</p>
            <span>10 Abril 2026</span>
          </div>

          <div class="estado activo">
            Activa
          </div>

          <div class="acciones">
            <button class="btn-editar">Editar</button>
            <button class="btn-cancelar">Cancelar</button>
          </div>

        </div>

      </div>

    </div>

  </div>
</div>
