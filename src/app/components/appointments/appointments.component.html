<div class="page">

  <div class="container">

    <div class="header">
      <h2>Citas</h2>
      <p>Gestiona la agenda del salón</p>
    </div>

    <!-- TABS -->
    <div class="tabs">

      <button [class.active]="view === 'create'" (click)="view = 'create'">Nueva Cita</button>
      <button [class.active]="view === 'list'" (click)="view = 'list'">Agenda</button>
      <button [class.active]="view === 'calendar'" (click)="view = 'calendar'">Calendario</button>

    </div>

    <!-- CREATE -->
    <div *ngIf="view === 'create'" class="card">

      <div class="grid">

        <input type="text" [(ngModel)]="selectedClient" placeholder="Cliente">

        <select [(ngModel)]="selectedEmployee">
          <option value="">Empleado</option>
          <option>Laura</option>
          <option>Camila</option>
          <option>Andrés</option>
        </select>

        <input type="date" [(ngModel)]="selectedDate">
        <input type="time" [(ngModel)]="selectedTime">

      </div>

      <div class="servicios-grid">

        <div class="servicio-item" [class.activo]="selectedService === 1" (click)="selectService(1)">Corte</div>
        <div class="servicio-item" [class.activo]="selectedService === 2" (click)="selectService(2)">Uñas</div>
        <div class="servicio-item" [class.activo]="selectedService === 3" (click)="selectService(3)">Tinte</div>

      </div>

      <button class="btn-primary" (click)="scheduleAppointment()">
        Agendar cita
      </button>

      <div class="alerta" *ngIf="showConfirmation">
        Cita registrada correctamente
      </div>

    </div>

    <!-- LIST -->
    <div *ngIf="view === 'list'" class="card">

      <div class="grid filtros">

        <input type="text" placeholder="Buscar cliente" [(ngModel)]="filterClient">
        <input type="text" placeholder="Buscar empleado" [(ngModel)]="filterEmployee">
        <input type="date" [(ngModel)]="filterDate">

      </div>

      <div *ngIf="appointments.length === 0" class="empty">
        No hay citas registradas
      </div>

      <div class="cita-card" *ngFor="let c of filteredAppointments()">

        <div>
          <h4>{{ c.client }}</h4>
          <p>{{ c.service }} • {{ c.time }}</p>
          <span>Empleado: {{ c.employee }}</span><br>
          <small>{{ c.status }}</small>
        </div>

      </div>

    </div>

    <!-- CALENDAR -->
    <div *ngIf="view === 'calendar'" class="card">

      <h3>Calendario</h3>

      <full-calendar [options]="calendarOptions"></full-calendar>

    </div>

  </div>
</div>
