<div class="page">

  <div class="container">

    <!-- Botón volver -->
    <div class="top-bar">
      <button routerLink="/home" class="btn-back">
        <lucide-icon [img]="icons.arrowLeft"></lucide-icon>
        <span>Volver</span>
      </button>
    </div>

    <!-- Header -->
    <div class="header">
      <h2>Glam<span>Gest</span></h2>
      <p>Registro de nuevos usuarios</p>
    </div>

    <!-- Formulario -->
    <form class="form" (ngSubmit)="registerUser()" autocomplete="off">

      <div class="campo">
        <label for="name">Nombre</label>
        <input id="name" type="text"
          [(ngModel)]="user.name"
          name="name"
          placeholder="Ej: Daniela Rincón"
          required>
      </div>

      <div class="campo">
        <label for="email">Correo</label>
        <input id="email" type="email"
          [(ngModel)]="user.email"
          name="email"
          placeholder="correo@ejemplo.com"
          required>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input id="password" type="password"
          [(ngModel)]="user.password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          required>
      </div>

      <button class="btn" type="submit">
        Registrar usuario
      </button>

    </form>

    <p class="mensaje">{{ message }}</p>

  </div>

</div>
